# 每日任务
name: bilibili-daily-task

on:
  workflow_dispatch: # 手动触发
  schedule: # 计划任务触发
    - cron: '0 21 * * *'
    # cron表达式，时区是UTC时间，比我们早8小时，如上所表示的是每天21点（21+8=次日5点整）

env:
  ASPNETCORE_ENVIRONMENT: ${{secrets.ENV}} # 运行环境
  Ray_BiliBiliCookies__1: ${{secrets.COOKIESTR}}
  Ray_BiliBiliCookies__2: ${{secrets.COOKIESTR2}}
  Ray_BiliBiliCookies__3: ${{secrets.COOKIESTR3}}
  # 推送：
  Ray_Serilog_WriteTo_3_Args_botToken: ${{secrets.PUSHTGTOKEN}} # Telegram
  Ray_Serilog_WriteTo_3_Args_chatId: ${{secrets.PUSHTGCHATID}}
  Ray_Serilog_WriteTo_3_Args_restrictedToMinimumLevel: ${{secrets.PUSHTGLEVEL}}
  Ray_Serilog_WriteTo_4_Args_webHookUrl: ${{secrets.PUSHWEIXINURL}} # 企业微信
  Ray_Serilog_WriteTo_4_Args_restrictedToMinimumLevel: ${{secrets.PUSHWEIXINLEVEL}}
  Ray_Serilog_WriteTo_5_Args_webHookUrl: ${{secrets.PUSHDINGURL}} # 钉钉
  Ray_Serilog_WriteTo_5_Args_restrictedToMinimumLevel: ${{secrets.PUSHDINGLEVEL}}
  Ray_Serilog_WriteTo_6_Args_scKey: ${{secrets.PUSHSCKKEY}} # Server酱
  Ray_Serilog_WriteTo_6_Args_turboSckey: ${{secrets.PUSHSERVERTSCKEY}}
  Ray_Serilog_WriteTo_6_Args_restrictedToMinimumLevel: ${{secrets.PUSHSERVERLEVEL}}
  Ray_Serilog_WriteTo_7_Args_sKey: ${{secrets.PUSHCOOLSKEY}} # 酷推
  Ray_Serilog_WriteTo_7_Args_restrictedToMinimumLevel: ${{secrets.PUSHCOOLLEVEL}}
  Ray_Serilog_WriteTo_8_Args_api: ${{secrets.PUSHOTHERAPI}} # 自定义api
  Ray_Serilog_WriteTo_8_Args_placeholder: ${{secrets.PUSHOTHERPLACEHOLDER}}
  Ray_Serilog_WriteTo_8_Args_bodyJsonTemplate: ${{secrets.PUSHOTHERBODYJSONTEMPLATE}}
  Ray_Serilog_WriteTo_8_Args_restrictedToMinimumLevel: ${{secrets.PUSHOTHERLEVEL}}
  Ray_Serilog_WriteTo_9_Args_token: ${{secrets.PUSHPLUSTOKEN}} # PushPlus
  Ray_Serilog_WriteTo_9_Args_topic: ${{secrets.PUSHPLUSTOPIC}}
  Ray_Serilog_WriteTo_9_Args_channel: ${{secrets.PUSHPLUSCHANNEL}}
  Ray_Serilog_WriteTo_9_Args_webhook: ${{secrets.PUSHPLUSWEBHOOK}}
  Ray_Serilog_WriteTo_9_Args_restrictedToMinimumLevel: ${{secrets.PUSHPLUSLEVEL}}
  # 安全相关：
  Ray_Security__IsSkipDailyTask: ${{secrets.ISSKIPDAILYTASK}}
  Ray_Security__IntervalSecondsBetweenRequestApi: ${{secrets.INTERVALSECONDSBETWEENREQUESTAPI}}
  Ray_Security__IntervalMethodTypes: ${{secrets.INTERVALMETHODTYPES}}
  Ray_Security__UserAgent: ${{secrets.USERAGENT}}
  Ray_Security__WebProxy: ${{secrets.WEBPROXY}}
  Ray_Security__RandomSleepMaxMin: ${{secrets.RANDOMSLEEPMAXMIN}}
  # 每日任务：
  Ray_DailyTaskConfig__NumberOfCoins: ${{secrets.NUMBEROFCOINS}}
  Ray_DailyTaskConfig__SaveCoinsWhenLv6: ${{secrets.SAVECOINSWHENLV6}}
  Ray_DailyTaskConfig__SelectLike: ${{secrets.SELECTLIKE}}
  Ray_DailyTaskConfig__SupportUpIds: ${{secrets.SUPPORTUPIDS}}
  Ray_DailyTaskConfig__DayOfAutoCharge: ${{secrets.DAYOFAUTOCHARGE}}
  Ray_DailyTaskConfig__AutoChargeUpId: ${{secrets.AUTOCHARGEUPID}}
  Ray_DailyTaskConfig__ChargeComment: ${{secrets.CHARGECOMMENT}}
  Ray_DailyTaskConfig__DayOfReceiveVipPrivilege: ${{secrets.DAYOFRECEIVEVIPPRIVILEGE}}
  Ray_DailyTaskConfig__DayOfExchangeSilver2Coin: ${{secrets.DAYOFEXCHANGESILVER2COIN}}
  Ray_DailyTaskConfig__DevicePlatform: ${{secrets.DEVICEPLATFORM}}
  Ray_Serilog_WriteTo_0_Args_restrictedToMinimumLevel: ${{secrets.CONSOLELOGLEVEL}}
  Ray_Serilog_WriteTo_0_Args_outputTemplate: ${{secrets.CONSOLELOGTEMPLATE}}

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }} # 不能直接传递secrets的值，否则会被skip，需要转一下
    steps:
      - id: check
        if: env.IsOpenDailyTask=='true'
        run: |
             echo "::set-output name=result::开启"

  run-daily-task:
    runs-on: ubuntu-latest
    environment: Production
    needs: pre-check
    if: needs.pre-check.outputs.result=='开启'
    steps:

      # 设置服务器时区为东八区
      - name: Set time zone
        run: sudo timedatectl set-timezone 'Asia/Shanghai'

      # 检出
      - name: Checkout
        uses: actions/checkout@v2

      # .Net 环境
      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 6.0.x

      # 测试运行
      - name: Run app
        run: dotnet run --project src/Ray.BiliBiliTool.Console --environment Production
        
